# Example single-project ProjectManifest.
# One repo (MyProductAPI) using the platform — no includes, no shell.
# Validate with:
#   platform-manifest validate examples/single_project/project_manifest.yaml --expected project

manifest_kind: project
manifest_version: "1.0.0"

platform_manifest:
  name: PlatformManifest
  version_constraint: ">=0.9,<1.0"

repos:
  my_product_api:
    canonical_name: MyProductAPI
    visibility: private
    runtime_role: project_service

edges:
  - {from: MyProductAPI, to: OperationsCenter, type: dispatches_to}
