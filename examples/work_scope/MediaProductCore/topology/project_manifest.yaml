manifest_kind: project
manifest_version: "1.0.0"

platform_manifest:
  name: PlatformManifest
  version_constraint: ">=0.9,<1.0"

repos:
  media_product_core_api:
    canonical_name: MediaProductCoreAPI
    visibility: private
    runtime_role: project_service
  media_product_core_worker:
    canonical_name: MediaProductCoreWorker
    visibility: private
    runtime_role: artifact_worker

edges:
  - {from: MediaProductCoreAPI, to: OperationsCenter, type: dispatches_to}
  - {from: MediaProductCoreWorker, to: MediaProductCoreAPI, type: depends_on_contracts_from}
