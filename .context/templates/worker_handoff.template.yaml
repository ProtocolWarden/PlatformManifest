# WorkerHandoff template
# Created by the orchestrator before dispatching an investigation worker.
# schema: https://github.com/ProtocolWarden/ContextLifecycle/blob/main/.context/schemas/worker_handoff.yaml

handoff_id: ""              # e.g. "handoff-$(date +%Y%m%d-%H%M)-<slug>"
schema_version: "0.1"
created_at: ""
source_checkpoint_id: ""
source_capsule_id: ""
target_worker_id: ""

task_description: ""

input_capsule_id: ""
input_artifacts: []
expected_output: "updated InvestigationCapsule with findings, next_actions, and updated status"
completion_criteria: "capsule status set to resolved, blocked, or superseded"
validation_command: ""
escalation_condition: "if fix requires changes outside allowed_paths or pipeline restart"

worker_scope:
  repo: ""                  # consumer repo name (set by dispatcher)
  allowed_paths:
    - ".console/"
    - "src/"
    - "tests/"
  forbidden_paths:
    - ".console/tmp/"
  allowed_tools: []
  allowed_subagents: 1
  mutation_policy: "write_allowed"

lease:
  max_minutes: 30
  max_tool_calls: 75
  max_subagents: 1
  expires_at: ""
  escalation_required_after: ""
