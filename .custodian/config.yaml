repo_key: PlatformManifest
src_root: src/platform_manifest
tests_root: tests

# ---------------------------------------------------------------------------
# Privacy / boundary enforcement (Custodian B-class)
# ---------------------------------------------------------------------------
# Names listed here cause Custodian B1 to fail any tracked file that
# mentions them. Default excludes (.console/**, config/managed_repos/local/**,
# docs/history/**, tools/audit/report/**, .custodian/config.yaml itself)
# spare operator-private and historical surfaces.
privacy:
  require_boundary_artifact: true
  # No baked-in artifact path: the pre-push hook / CI resolve and export
  # REPOGRAPH_BOUNDARY_ARTIFACT_FILE by role (never a hardcoded private
  # repo-instance path). Absent env ⇒ B2 fails closed, as required.

# ---------------------------------------------------------------------------
# DC2/DC5/DC7: orphan and link detection — exclude verification artifacts
# ---------------------------------------------------------------------------
doc_conventions:
  exclude_path_patterns:
    # Defaults (must re-include when overriding)
    - "**/archive/**"
    - "**/history/**"
    # Verification artifacts — linked from context, not the doc tree
    - docs/verification/**
    # Warm-tier leaf docs — injected at edit time by the context router, not
    # part of the human doc tree (see docs/architecture/context-injection-spec.md).
    - docs/inject/**

# ---------------------------------------------------------------------------
# Audit: per-detector exclusions + known values
# ---------------------------------------------------------------------------
# `platform` is a manifest-level concept / slug, not a src enum string (K2).
audit:
  # Reconcile detectors R1/R2 (console-reconciliation-spec.md §2) — opt-in,
  # safe to enable now that this repo's tracked `.console/` is reconciled and
  # leak-clean (history archived to the private side).
  reconcile_enforce: true
  known_values:
    - platform
    # `main` is the default branch name, cited in docs/work-orders — not a src enum.
    - main
  exclude_paths:
    C29:
      # composition.py is the platform-graph composition core — splitting
      # would fracture the interrelated graph operations.
      - src/platform_manifest/composition.py
    T1:
      - src/platform_manifest/cli.py
      - src/platform_manifest/composition.py
      - src/platform_manifest/loader.py
      - src/platform_manifest/models.py
      - src/platform_manifest/validate.py
      # Bridge + custodian-internal modules: tested transitively via test_repograph_bridge.py / custodian tests.
      - src/platform_manifest/_repograph.py
      - src/platform_manifest/custodian.py
      - src/platform_manifest/custodian_native.py
    T6:
      - src/platform_manifest/cli.py
      - src/platform_manifest/composition.py
      - src/platform_manifest/loader.py
      - src/platform_manifest/models.py
      - src/platform_manifest/validate.py
      # Bridge/custodian-internal and ontology/projection/topology modules: no direct module
      # import in test files (bridge uses dynamic import_repograph; others tested transitively).
      - src/platform_manifest/_repograph.py
      - src/platform_manifest/custodian.py
      - src/platform_manifest/custodian_native.py
      - src/platform_manifest/errors.py
      - src/platform_manifest/ontology/enums.py
      - src/platform_manifest/ontology/models.py
      - src/platform_manifest/ontology/validation.py
      - src/platform_manifest/projection/models.py
      - src/platform_manifest/projection/redaction.py
      - src/platform_manifest/projection/rules.py
      - src/platform_manifest/projection/validation.py
      - src/platform_manifest/topology/edges.py
      - src/platform_manifest/topology/models.py
      - src/platform_manifest/topology/validation.py
    T7:
      - src/platform_manifest/cli.py
      - src/platform_manifest/loader.py
      - src/platform_manifest/models.py
      # No parallel test files for bridge/custodian-internal or ontology/projection/topology;
      # tested transitively via test_repograph_bridge.py and service-level tests.
      - src/platform_manifest/_repograph.py
      - src/platform_manifest/custodian.py
      - src/platform_manifest/custodian_native.py
      - src/platform_manifest/errors.py
      - src/platform_manifest/ontology/enums.py
      - src/platform_manifest/ontology/models.py
      - src/platform_manifest/ontology/validation.py
      - src/platform_manifest/projection/models.py
      - src/platform_manifest/projection/redaction.py
      - src/platform_manifest/projection/rules.py
      - src/platform_manifest/projection/validation.py
      - src/platform_manifest/topology/edges.py
      - src/platform_manifest/topology/models.py
      - src/platform_manifest/topology/validation.py
    D11:
      # cli.py upstream_cmd/downstream_cmd are CLI command pair (typology).
      # models.py upstream/downstream + the consumer-traversal trio are
      # graph-traversal helpers — pattern-similar by design.
      - src/platform_manifest/cli.py
      - src/platform_manifest/models.py
      # loader.py parse_edges/parse_relationships: graph-pair — similar body by design.
      - src/platform_manifest/loader.py
    T8:
      # Tests use schema files + fixtures and construct from data tables;
      # they don't import platform_manifest by name.
      - tests/test_composition.py
      - tests/test_effective_cli.py
      - tests/test_repo_graph.py
      - tests/test_validate.py
      - tests/test_work_scope.py
      # Architecture-doc test exercises file structure, not Python imports.
      - tests/test_architecture_docs.py
      # Context-injection engine lives in .context/.engine/ (its prototype home,
      # spec §1/§7 — to be productionized into ContextLifecycle), so these tests
      # load it via importlib spec_from_file_location, not a src import.
      - tests/test_context_router.py
      - tests/test_cold_store.py
      - tests/test_consolidate.py
    # K2 has no exclude_paths support — use audit.known_values instead.
    # DC7 has no exclude_paths support — use doc_conventions.exclude_path_patterns instead.

