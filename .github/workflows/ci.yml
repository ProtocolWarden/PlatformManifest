name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  license-check:
    name: License headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SPDX headers
        run: |
          missing=$(git ls-files "*.py" | xargs grep -L "SPDX-License-Identifier" 2>/dev/null || true)
          if [ -n "$missing" ]; then
            echo "Missing SPDX-License-Identifier header in:"
            echo "$missing"
            exit 1
          fi

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff>=0.5"
      - name: Run ruff
        run: ruff check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  validate-bundled-manifest:
    name: Validate bundled platform_manifest.yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e .
      - name: Validate bundled platform manifest
        run: |
          platform-manifest validate \
            src/platform_manifest/data/platform_manifest.yaml \
            --expected platform

  validate-examples:
    name: Validate example manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e .
      - name: Validate single-project example
        run: |
          platform-manifest validate \
            examples/single_project/project_manifest.yaml \
            --expected project
      - name: Validate work-scope constituents
        run: |
          platform-manifest validate \
            examples/work_scope/MediaProductCore/topology/project_manifest.yaml \
            --expected project
          platform-manifest validate \
            examples/work_scope/MediaProductAssets/topology/project_manifest.yaml \
            --expected project
      - name: Validate work-scope manifest
        run: |
          platform-manifest validate \
            examples/work_scope/MediaProductSuite/topology/work_scope_manifest.yaml \
            --expected work_scope
