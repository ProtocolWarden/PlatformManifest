name: custodian-audit

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Custodian
        run: |
          python -m pip install --upgrade pip
          pip install "custodian[tools] @ git+https://github.com/ProtocolWarden/Custodian.git@main"
          pip install ruff vulture ty

      - name: Install repo (best-effort, for adapter passes)
        run: |
          if [ -f pyproject.toml ]; then
            pip install -e . || true
          fi

      - name: Materialize boundary artifact file
        # The boundary disclosure artifact is produced by the private repo
        # (PrivateManifest) and cannot live on a public runner as a filesystem
        # path. Ship its CONTENT as the base64 secret REPOGRAPH_BOUNDARY_ARTIFACT_B64
        # and decode it to a runner-local file here. Generate the secret with:
        #   base64 -w0 ../PrivateManifest/dist/boundary_disclosure_artifact.json
        env:
          REPOGRAPH_BOUNDARY_ARTIFACT_B64: ${{ secrets.REPOGRAPH_BOUNDARY_ARTIFACT_B64 }}
        run: |
          if [ -z "${REPOGRAPH_BOUNDARY_ARTIFACT_B64:-}" ]; then
            echo "Missing REPOGRAPH_BOUNDARY_ARTIFACT_B64 secret." >&2
            echo "Set it to the base64-encoded boundary disclosure artifact JSON:" >&2
            echo "  base64 -w0 ../PrivateManifest/dist/boundary_disclosure_artifact.json" >&2
            exit 1
          fi
          dest="${RUNNER_TEMP}/boundary_disclosure_artifact.json"
          printf '%s' "$REPOGRAPH_BOUNDARY_ARTIFACT_B64" | base64 -d > "$dest"
          python - "$dest" <<'PY'
          import json
          import sys
          from pathlib import Path

          data = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          print(f"boundary_provenance={data.get('source_graph_id')}@{data.get('source_ref_or_commit')}")
          PY
          echo "REPOGRAPH_BOUNDARY_ARTIFACT_FILE=$dest" >> "$GITHUB_ENV"

      - name: Run Custodian audit
        run: |
          custodian-multi --repos . --fail-on-findings --no-color
